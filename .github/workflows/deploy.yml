# main 브랜치에 push 시 Vercel 프로덕션 자동 배포
# 비활성화: GitHub Secrets(VERCEL_TOKEN 등) 미설정 시 실패 → npm run deploy 사용
name: Deploy to Vercel

on:
  workflow_dispatch:  # 수동 실행만 (push 시 자동 실행 비활성화)
  # push:
  #   branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: EvanNotFound/vercel-deployment-for-github-actions@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_SCOPE: koobg9-ms-projects
          PRODUCTION: true
